spring:
  application:
    name: dealit
  profiles:
    default: local
  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:25MB}

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:80}
  events:
    sse:
      redis:
        enabled: ${APP_EVENTS_SSE_REDIS_ENABLED:true}
        channel: ${APP_EVENTS_SSE_REDIS_CHANNEL:dealit:events:sse-events}
  images:
    public-base-url: ${APP_IMAGES_PUBLIC_BASE_URL:http://localhost:${SERVER_PORT:8080}}
    storage-root: ${APP_IMAGES_STORAGE_ROOT:${user.dir}/uploads}
    storage-type: ${APP_IMAGES_STORAGE_TYPE:local}
    s3-bucket: ${AWS_S3_BUCKET:}
    s3-region: ${AWS_REGION:ap-northeast-2}
    s3-access-key-id: ${AWS_ACCESS_KEY_ID:}
    s3-secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
  email-verification:
    code-ttl-seconds: ${APP_EMAIL_VERIFICATION_CODE_TTL_SECONDS:300}
    verified-ttl-seconds: ${APP_EMAIL_VERIFICATION_VERIFIED_TTL_SECONDS:1800}
    subject: ${APP_EMAIL_VERIFICATION_SUBJECT:Dealit 이메일 인증 코드}
    sender-address: ${APP_EMAIL_VERIFICATION_SENDER_ADDRESS:}
  mail:
    host: ${APP_MAIL_HOST:}
    port: ${APP_MAIL_PORT:587}
    username: ${APP_MAIL_USERNAME:}
    password: ${APP_MAIL_PASSWORD:}
    protocol: ${APP_MAIL_PROTOCOL:smtp}
    auth: ${APP_MAIL_AUTH:true}
    starttls-enable: ${APP_MAIL_STARTTLS_ENABLE:true}
  firebase:
    enabled: ${FIREBASE_ENABLED:false}
    project-id: ${FIREBASE_PROJECT_ID:dealit-f6b55}
    service-account-path: ${FIREBASE_SERVICE_ACCOUNT_PATH:}
    service-account-json: ${FIREBASE_SERVICE_ACCOUNT_JSON:}
    service-account-base64: ${FIREBASE_SERVICE_ACCOUNT_BASE64:}
  search:
    opensearch:
      enabled: ${OPENSEARCH_ENABLED:true}
      auto-reindex-on-startup: ${OPENSEARCH_AUTO_REINDEX_ON_STARTUP:false}
      uri: ${OPENSEARCH_URI:http://localhost:9200}
      index-name: ${OPENSEARCH_INDEX_NAME:dealit-search}
  ai:
    category-recommendation:
      base-url: ${AI_CATEGORY_RECOMMENDATION_BASE_URL:http://localhost:8000}

jwt:
  secret: ${JWT_SECRET:dealit-local-secret-key-dealit-local-secret-key}
  access-token-expiration-ms: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:3600000}
  issuer: ${JWT_ISSUER:dealit}

kakao:
  local:
    base-url: ${KAKAO_LOCAL_BASE_URL:https://dapi.kakao.com}
    rest-api-key: ${KAKAO_REST_API_KEY:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  api-docs:
    path: /api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
  health:
    probes:
      enabled: true

spring:
  datasource:
    url: jdbc:h2:mem:dealit;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  data:
    redis:
      repositories:
        enabled: false

jwt:
  secret: test-secret-key-test-secret-key-test-secret-key
  access-token-expiration-ms: 3600000
  issuer: dealit-test

management:
  health:
    redis:
      enabled: false

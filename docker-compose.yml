services:
  postgres:
    image: postgres:16
    container_name: dealit-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-dealit}
      POSTGRES_USER: ${DB_USERNAME:-dealit}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dealit}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-dealit} -d ${DB_NAME:-dealit}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: dealit-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dealit-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-dealit}
      DB_USERNAME: ${DB_USERNAME:-dealit}
      DB_PASSWORD: ${DB_PASSWORD:-dealit}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SERVER_PORT: ${SERVER_PORT:-8080}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      JPA_SHOW_SQL: ${JPA_SHOW_SQL:-false}
      JPA_FORMAT_SQL: ${JPA_FORMAT_SQL:-true}
      HIBERNATE_SQL_LOG_LEVEL: ${HIBERNATE_SQL_LOG_LEVEL:-info}
      JWT_SECRET: ${JWT_SECRET:-dealit-local-secret-key-dealit-local-secret-key}
      JWT_ACCESS_TOKEN_EXPIRATION_MS: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:-3600000}
      JWT_ISSUER: ${JWT_ISSUER:-dealit}
      KAKAO_REST_API_KEY: ${KAKAO_REST_API_KEY}
      KAKAO_LOCAL_BASE_URL: ${KAKAO_LOCAL_BASE_URL:-https://dapi.kakao.com}
      APP_MAIL_HOST: ${APP_MAIL_HOST:-}
      APP_MAIL_PORT: ${APP_MAIL_PORT:-587}
      APP_MAIL_USERNAME: ${APP_MAIL_USERNAME:-}
      APP_MAIL_PASSWORD: ${APP_MAIL_PASSWORD:-}
      APP_MAIL_PROTOCOL: ${APP_MAIL_PROTOCOL:-smtp}
      APP_MAIL_AUTH: ${APP_MAIL_AUTH:-true}
      APP_MAIL_STARTTLS_ENABLE: ${APP_MAIL_STARTTLS_ENABLE:-true}
      APP_EMAIL_VERIFICATION_SENDER_ADDRESS: ${APP_EMAIL_VERIFICATION_SENDER_ADDRESS:-}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:${NGINX_PORT:-80}}
      APP_IMAGES_PUBLIC_BASE_URL: ${APP_IMAGES_PUBLIC_BASE_URL:-http://localhost}
      APP_IMAGES_STORAGE_ROOT: ${APP_IMAGES_STORAGE_ROOT:-/app/uploads}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - auction-image-data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.29-alpine
    container_name: dealit-nginx
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/logs:/var/log/nginx

volumes:
  auction-image-data:
  postgres-data:
  redis-data:

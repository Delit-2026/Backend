name: Deploy backend

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: backend-production
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Run tests
        run: ./gradlew test --no-daemon

  build-and-deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name
        run: |
          echo "BACKEND_IMAGE_REPOSITORY=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}:latest" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.BACKEND_IMAGE_REPOSITORY }}:${{ github.sha }}

      - name: Copy production compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          source: docker-compose.prod.yml
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        env:
          BACKEND_IMAGE: ${{ env.BACKEND_IMAGE }}
          RDS_DB_HOST: ${{ secrets.RDS_DB_HOST }}
          RDS_DB_PORT: ${{ secrets.RDS_DB_PORT }}
          RDS_DB_NAME: ${{ secrets.RDS_DB_NAME }}
          RDS_DB_USERNAME: ${{ secrets.RDS_DB_USERNAME }}
          RDS_DB_PASSWORD: ${{ secrets.RDS_DB_PASSWORD }}
          DEPLOY_AI_PATH: ${{ secrets.DEPLOY_AI_PATH }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: BACKEND_IMAGE,RDS_DB_HOST,RDS_DB_PORT,RDS_DB_NAME,RDS_DB_USERNAME,RDS_DB_PASSWORD,DEPLOY_AI_PATH
          script: |
            set -e
            cd "${{ secrets.DEPLOY_PATH }}"
            touch .env
            set_env_var() {
              key="$1"
              value="$2"
              if [ -z "$value" ]; then
                echo "Required value for ${key} is empty."
                exit 1
              fi
              tmp="$(mktemp)"
              if grep -q "^${key}=" .env; then
                awk -v key="$key" -v value="$value" 'BEGIN { prefix = key "=" } index($0, prefix) == 1 { $0 = prefix value } { print }' .env > "$tmp"
                cat "$tmp" > .env
              else
                printf '\n%s=%s\n' "$key" "$value" >> .env
              fi
              rm -f "$tmp"
            }
            set_env_var_if_present() {
              key="$1"
              value="$2"
              if [ -n "$value" ]; then
                set_env_var "$key" "$value"
              fi
            }
            if docker compose version >/dev/null 2>&1; then
              COMPOSE="docker compose"
            elif command -v docker-compose >/dev/null 2>&1; then
              COMPOSE="docker-compose"
            else
              echo "Docker Compose is not installed. Install docker compose plugin or docker-compose."
              exit 1
            fi
            docker login ghcr.io -u "${{ github.actor }}" -p "${{ secrets.GITHUB_TOKEN }}"
            set_env_var BACKEND_IMAGE "$BACKEND_IMAGE"
            set_env_var DB_HOST "$RDS_DB_HOST"
            set_env_var DB_PASSWORD "$RDS_DB_PASSWORD"
            set_env_var_if_present DB_PORT "$RDS_DB_PORT"
            set_env_var_if_present DB_NAME "$RDS_DB_NAME"
            set_env_var_if_present DB_USERNAME "$RDS_DB_USERNAME"
            AI_PATH="${DEPLOY_AI_PATH:-../AI}"
            if [ ! -d "$AI_PATH" ]; then
              echo "AI directory does not exist: ${AI_PATH}"
              exit 1
            fi
            if [ ! -f "$AI_PATH/Dockerfile" ]; then
              echo "AI Dockerfile does not exist: ${AI_PATH}/Dockerfile"
              exit 1
            fi
            if [ ! -f "$AI_PATH/.env" ]; then
              echo "AI .env does not exist: ${AI_PATH}/.env"
              exit 1
            fi
            if [ -d "$AI_PATH/.git" ]; then
              git -C "$AI_PATH" pull --ff-only
            fi
            set_env_var AI_BUILD_CONTEXT "$AI_PATH"
            set_env_var AI_ENV_FILE "$AI_PATH/.env"
            $COMPOSE -f docker-compose.prod.yml pull backend
            $COMPOSE -f docker-compose.prod.yml up -d --build --remove-orphans
            docker image prune -f
            for i in $(seq 1 30); do
              if curl --fail --silent --show-error "http://localhost:${SERVER_PORT:-8080}/actuator/health"; then
                exit 0
              fi
              echo "Waiting for backend health check... (${i}/30)"
              sleep 5
            done
            $COMPOSE -f docker-compose.prod.yml ps
            $COMPOSE -f docker-compose.prod.yml logs --tail=200 backend
            exit 1

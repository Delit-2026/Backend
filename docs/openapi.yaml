openapi: 3.1.0
info:
  title: Dealit API
  description: Dealit backend API documentation
  contact:
    name: Dealit Team
  version: v1
servers:
- url: http://localhost:8080
  description: Local server
security:
- bearerAuth: []
tags:
- name: Member
  description: 회원 API
- name: Chats
  description: 채팅 API
- name: Auth
  description: 인증 API
- name: Health
  description: Application health check
paths:
  /api/v1/members/signup:
    post:
      tags:
      - Member
      summary: 회원가입
      description: 신규 회원을 생성합니다.
      operationId: signUp
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
        required: true
      responses:
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SignUpResponse"
  /api/v1/chats/rooms:
    get:
      tags:
      - Chats
      summary: 채팅방 목록 조회
      operationId: getChatRooms
      parameters:
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ChatRoomListResponse"
    post:
      tags:
      - Chats
      summary: 채팅방 생성
      operationId: createChatRoom
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatRoomRequest"
        required: true
      responses:
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CreateChatRoomResponse"
  /api/v1/chats/rooms/{roomId}/messages:
    get:
      tags:
      - Chats
      summary: 채팅 메시지 목록 조회
      operationId: getChatMessages
      parameters:
      - name: roomId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      - name: page
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      - name: size
        in: query
        required: false
        schema:
          type: integer
          format: int32
          default: 50
      responses:
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ChatMessageListResponse"
    post:
      tags:
      - Chats
      summary: 채팅 메시지 전송
      operationId: sendMessage
      parameters:
      - name: roomId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendChatMessageRequest"
        required: true
      responses:
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SendChatMessageResponse"
  /api/v1/chats/messages/{messageId}/reports:
    post:
      tags:
      - Chats
      summary: 채팅 메시지 신고
      operationId: reportMessage
      parameters:
      - name: messageId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportChatMessageRequest"
        required: true
      responses:
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ReportChatMessageResponse"
  /api/v1/auth/login:
    post:
      tags:
      - Auth
      summary: 로그인
      description: 로그인 성공 시 JWT Access Token을 발급합니다.
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/LoginResponse"
  /api/v1/chats/rooms/{roomId}/read:
    patch:
      tags:
      - Chats
      summary: 채팅방 읽음 처리
      operationId: markAsRead
      parameters:
      - name: roomId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MarkChatRoomAsReadResponse"
  /api/v1/health:
    get:
      tags:
      - Health
      summary: Health check
      description: Returns basic application status
      operationId: health
      responses:
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: object
                additionalProperties: {}
  /api/v1/chats/unread-count:
    get:
      tags:
      - Chats
      summary: 전체 안읽음 개수 조회
      operationId: getUnreadCount
      responses:
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UnreadCountResponse"
  /api/v1/auth/me:
    get:
      tags:
      - Auth
      summary: 내 정보 조회
      description: 현재 인증된 회원의 기본 정보를 조회합니다.
      operationId: me
      responses:
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CurrentMemberResponse"
  /api/v1/chats/messages/{messageId}:
    delete:
      tags:
      - Chats
      summary: 채팅 메시지 삭제
      operationId: deleteMessage
      parameters:
      - name: messageId
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "400":
          description: Bad Request
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not Found
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "200":
          description: OK
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          format: int32
        code:
          type: string
        message:
          type: string
        errors:
          type: array
          items:
            $ref: "#/components/schemas/FieldErrorDetail"
    FieldErrorDetail:
      type: object
      properties:
        field:
          type: string
        rejectedValue: {}
        reason:
          type: string
    SignUpRequest:
      type: object
      description: 회원가입 요청
      properties:
        loginId:
          type: string
          description: 로그인 아이디
          example: dealit-user
          maxLength: 30
          minLength: 0
        password:
          type: string
          description: 비밀번호
          example: Password123!
          maxLength: 30
          minLength: 8
        email:
          type: string
          format: email
          description: 이메일
          example: user@dealit.com
          maxLength: 100
          minLength: 0
        name:
          type: string
          description: 이름
          example: 홍길동
          maxLength: 30
          minLength: 0
      required:
      - email
      - loginId
      - password
    SignUpResponse:
      type: object
      description: 회원가입 응답
      properties:
        memberId:
          type: integer
          format: int64
          description: 회원 ID
          example: 1
        loginId:
          type: string
          description: 로그인 아이디
          example: dealit-user
        email:
          type: string
          description: 이메일
          example: user@dealit.com
        nickname:
          type: string
          description: 자동 생성 닉네임
          example: Dealit#1
        createdAt:
          type: string
          format: date-time
          description: 생성 시각
    CreateChatRoomRequest:
      type: object
      properties:
        productId:
          type: integer
          format: int64
        receiverId:
          type: integer
          format: int64
      required:
      - productId
      - receiverId
    ActionButtons:
      type: object
      properties:
        canPay:
          type: boolean
        canCompleteTrade:
          type: boolean
        payButtonType:
          type: string
        completeTradeButtonType:
          type: string
    CreateChatRoomResponse:
      type: object
      properties:
        roomId:
          type: integer
          format: int64
        chatType:
          type: string
          enum:
          - GENERAL
          - AUCTION
        product:
          $ref: "#/components/schemas/ProductInfo"
        participants:
          type: array
          items:
            $ref: "#/components/schemas/ParticipantInfo"
        isWinner:
          type: boolean
        actionButtons:
          $ref: "#/components/schemas/ActionButtons"
        createdAt:
          type: string
          format: date-time
    ParticipantInfo:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        nickname:
          type: string
        role:
          type: string
    ProductInfo:
      type: object
      properties:
        productId:
          type: integer
          format: int64
        name:
          type: string
        thumbnailUrl:
          type: string
        saleType:
          type: string
        status:
          type: string
    SendChatMessageRequest:
      type: object
      properties:
        messageType:
          type: string
          enum:
          - TEXT
          - IMAGE
          - SYSTEM
          - TALK
        content:
          type: string
          maxLength: 1000
          minLength: 1
      required:
      - content
      - messageType
    SendChatMessageResponse:
      type: object
      properties:
        messageId:
          type: integer
          format: int64
        roomId:
          type: integer
          format: int64
        senderId:
          type: integer
          format: int64
        messageType:
          type: string
          enum:
          - TEXT
          - IMAGE
          - SYSTEM
          - TALK
        content:
          type: string
        isRead:
          type: boolean
        sentAt:
          type: string
          format: date-time
    ReportChatMessageRequest:
      type: object
      properties:
        reason:
          type: string
          maxLength: 255
          minLength: 1
      required:
      - reason
    ReportChatMessageResponse:
      type: object
      properties:
        reportId:
          type: integer
          format: int64
        messageId:
          type: integer
          format: int64
        reportedAt:
          type: string
          format: date-time
    LoginRequest:
      type: object
      description: 로그인 요청
      properties:
        loginId:
          type: string
          description: 로그인 아이디
          example: dealit-user
          maxLength: 30
          minLength: 0
        password:
          type: string
          description: 비밀번호
          example: Password123!
          maxLength: 30
          minLength: 8
      required:
      - loginId
      - password
    LoginResponse:
      type: object
      description: 로그인 응답
      properties:
        accessToken:
          type: string
          description: Access Token
        tokenType:
          type: string
          description: 토큰 타입
          example: Bearer
        expiresIn:
          type: integer
          format: int64
          description: 만료 시간(ms)
          example: 3600000
    MarkChatRoomAsReadResponse:
      type: object
      properties:
        roomId:
          type: integer
          format: int64
        unreadCount:
          type: integer
          format: int32
        readAt:
          type: string
          format: date-time
    UnreadCountResponse:
      type: object
      properties:
        totalUnreadCount:
          type: integer
          format: int32
        updatedAt:
          type: string
          format: date-time
    ChatRoomListItemResponse:
      type: object
      properties:
        roomId:
          type: integer
          format: int64
        opponent:
          $ref: "#/components/schemas/OpponentInfo"
        product:
          $ref: "#/components/schemas/ProductInfo"
        chatType:
          type: string
          enum:
          - GENERAL
          - AUCTION
        lastMessage:
          $ref: "#/components/schemas/LastMessageInfo"
        unreadCount:
          type: integer
          format: int32
        updatedAt:
          type: string
          format: date-time
    ChatRoomListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/ChatRoomListItemResponse"
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        hasNext:
          type: boolean
    LastMessageInfo:
      type: object
      properties:
        messageId:
          type: integer
          format: int64
        type:
          type: string
        content:
          type: string
        sentAt:
          type: string
          format: date-time
    OpponentInfo:
      type: object
      properties:
        userId:
          type: integer
          format: int64
        nickname:
          type: string
        profileImageUrl:
          type: string
    ChatMessageListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessageResponse"
        page:
          type: integer
          format: int32
        size:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
          format: int32
        hasNext:
          type: boolean
    ChatMessageResponse:
      type: object
      properties:
        messageId:
          type: integer
          format: int64
        senderId:
          type: integer
          format: int64
        senderNickname:
          type: string
        messageType:
          type: string
          enum:
          - TEXT
          - IMAGE
          - SYSTEM
          - TALK
        content:
          type: string
        isRead:
          type: boolean
        sentAt:
          type: string
          format: date-time
    CurrentMemberResponse:
      type: object
      description: 현재 인증된 회원 정보
      properties:
        memberId:
          type: integer
          format: int64
          description: 회원 ID
          example: 1
        loginId:
          type: string
          description: 로그인 아이디
          example: dealit-user
        email:
          type: string
          description: 이메일
          example: user@dealit.com
        nickname:
          type: string
          description: 닉네임
          example: Dealit#1
  securitySchemes:
    bearerAuth:
      type: http
      name: Authorization
      in: header
      scheme: bearer
      bearerFormat: JWT

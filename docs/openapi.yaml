openapi: 3.1.0
info:
  title: Dealit API
  description: Dealit backend API documentation
  contact:
    name: Dealit Team
  version: v1
servers:
  - url: http://localhost:8080
    description: Local server
security:
  - bearerAuth: []
tags:
  - name: Member
    description: 회원 API
  - name: Chats
    description: 채팅 API
  - name: Profile
    description: 마이페이지 프로필 API
  - name: Auction
    description: 경매 API
  - name: Auth
    description: 인증 API
  - name: Health
    description: Application health check
paths:
  # --- Profile API ---
  /api/v1/users/me/profile-image:
    post:
      tags:
        - Profile
      summary: 프로필 이미지 업로드
      operationId: uploadProfileImage
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
                - file
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UploadProfileImageResponse"

  /api/v1/users/me/profile:
    patch:
      tags:
        - Profile
      summary: 프로필 수정
      operationId: updateProfile
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyProfileRequest"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MyPageProfileResponse"

  /api/v1/users/me/location:
    patch:
      tags:
        - Profile
      summary: 지역 수정
      operationId: updateLocation
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMyLocationRequest"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UpdateMyLocationResponse"

  /api/v1/users/me/mypage:
    get:
      tags:
        - Profile
      summary: 마이페이지 프로필 조회
      operationId: getMyPageProfile
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MyPageProfileResponse"

  # --- Member API ---
  /api/v1/members/signup:
    post:
      tags:
        - Member
      summary: 회원가입
      operationId: signUp
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignUpRequest"
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SignUpResponse"

  /api/v1/members/nickname/check:
    get:
      tags:
        - Member
      summary: 닉네임 중복 확인
      operationId: checkNickname
      parameters:
        - name: nickname
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/NicknameCheckResponse"

  /api/v1/members/login-id/check:
    get:
      tags:
        - Member
      summary: 로그인 아이디 중복 확인
      operationId: checkLoginId
      parameters:
        - name: loginId
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/LoginIdCheckResponse"

  # --- Auth API ---
  /api/v1/auth/login:
    post:
      tags:
        - Auth
      summary: 로그인
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/LoginResponse"

  /api/v1/auth/me:
    get:
      tags:
        - Auth
      summary: 내 정보 조회
      operationId: me
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CurrentMemberResponse"

  # --- Chats API ---
  /api/v1/chats/rooms:
    get:
      tags:
        - Chats
      summary: 채팅방 목록 조회
      operationId: getChatRooms
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ChatRoomListResponse"
    post:
      tags:
        - Chats
      summary: 채팅방 생성
      operationId: createChatRoom
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatRoomRequest"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CreateChatRoomResponse"

  /api/v1/chats/rooms/{roomId}/messages:
    get:
      tags:
        - Chats
      summary: 채팅 메시지 목록 조회
      operationId: getChatMessages
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ChatMessageListResponse"
    post:
      tags:
        - Chats
      summary: 채팅 메시지 전송
      operationId: sendMessage
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendChatMessageRequest"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/SendChatMessageResponse"

  /api/v1/chats/rooms/{roomId}/read:
    patch:
      tags:
        - Chats
      summary: 채팅방 읽음 처리
      operationId: markAsRead
      parameters:
        - name: roomId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/MarkChatRoomAsReadResponse"

  /api/v1/chats/unread-count:
    get:
      tags:
        - Chats
      summary: 전체 안읽음 개수 조회
      operationId: getUnreadCount
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/UnreadCountResponse"

  /api/v1/chats/messages/{messageId}:
    delete:
      tags:
        - Chats
      summary: 채팅 메시지 삭제
      operationId: deleteChatMessage
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK

  /api/v1/chats/messages/{messageId}/reports:
    post:
      tags:
        - Chats
      summary: 채팅 메시지 신고
      operationId: reportMessage
      parameters:
        - name: messageId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportChatMessageRequest"
      responses:
        "200":
          description: OK

  # --- Auction API ---
  /api/v1/auction/categories:
    get:
      tags:
        - Auction
      summary: 카테고리 목록 조회
      operationId: getCategories
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/CategoryOptionResponse"

  /api/v1/auction/image/{imageId}:
    delete:
      tags:
        - Auction
      summary: 상품 이미지 삭제
      operationId: deleteAuctionImage
      parameters:
        - name: imageId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/DeleteAuctionImageResponse"

  /api/v1/health:
    get:
      tags:
        - Health
      summary: Health check
      operationId: health
      responses:
        "200":
          description: OK

components:
  schemas:
    # Error Schema
    ErrorResponse:
      type: object
      properties:
        timestamp: { type: string, format: date-time }
        status: { type: integer }
        code: { type: string }
        message: { type: string }

    # Auth & Member Schemas
    LoginRequest:
      type: object
      required: [loginId, password]
      properties:
        loginId: { type: string, example: dealit-user }
        password: { type: string, example: Password123! }
    
    LoginResponse:
      type: object
      properties:
        accessToken: { type: string }
        tokenType: { type: string, example: Bearer }
        expiresIn: { type: integer, format: int64 }

    SignUpRequest:
      type: object
      required: [loginId, password, email]
      properties:
        loginId: { type: string, maxLength: 30 }
        password: { type: string, minLength: 8 }
        email: { type: string, format: email }
        name: { type: string }

    SignUpResponse:
      type: object
      properties:
        memberId: { type: integer, format: int64 }
        loginId: { type: string }
        nickname: { type: string }

    CurrentMemberResponse:
      type: object
      properties:
        memberId: { type: integer, format: int64 }
        loginId: { type: string }
        email: { type: string }
        nickname: { type: string, example: 당근한입 }

    # Profile Schemas
    UploadProfileImageResponse:
      type: object
      properties:
        profileImageUrl: { type: string }

    UpdateMyProfileRequest:
      type: object
      required: [nickname]
      properties:
        nickname: { type: string, minLength: 2 }
        bio: { type: string }
        profileImageUrl: { type: string }

    MyPageProfileResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        nickname: { type: string }
        email: { type: string }
        bio: { type: string }
        profileImageUrl: { type: string }
        location: { type: string }
        rating: { type: number, format: double }

    # Chat Schemas
    CreateChatRoomRequest:
      type: object
      required: [productId, receiverId]
      properties:
        productId: { type: integer, format: int64 }
        receiverId: { type: integer, format: int64 }

    CreateChatRoomResponse:
      type: object
      properties:
        roomId: { type: integer, format: int64 }
        chatType: { type: string, enum: [GENERAL, AUCTION] }

    ChatRoomListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/ChatRoomListItemResponse"

    ChatRoomListItemResponse:
      type: object
      properties:
        roomId: { type: integer, format: int64 }
        unreadCount: { type: integer }

    ChatMessageListResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessageResponse"

    ChatMessageResponse:
      type: object
      properties:
        messageId: { type: integer, format: int64 }
        content: { type: string }
        senderNickname: { type: string }
        sentAt: { type: string, format: date-time }

    SendChatMessageRequest:
      type: object
      required: [content, messageType]
      properties:
        content: { type: string }
        messageType: { type: string, enum: [TEXT, IMAGE, SYSTEM, TALK] }

    SendChatMessageResponse:
      $ref: "#/components/schemas/ChatMessageResponse"

    MarkChatRoomAsReadResponse:
      type: object
      properties:
        roomId: { type: integer, format: int64 }
        unreadCount: { type: integer }

    UnreadCountResponse:
      type: object
      properties:
        totalUnreadCount: { type: integer }

    ReportChatMessageRequest:
      type: object
      required: [reason]
      properties:
        reason: { type: string, maxLength: 255 }

    # Auction Schemas
    CategoryOptionResponse:
      type: object
      properties:
        id: { type: integer, format: int64 }
        nameKo: { type: string }
        children:
          type: array
          items:
            $ref: "#/components/schemas/CategoryOptionResponse"

    DeleteAuctionImageResponse:
      type: object
      properties:
        imageId: { type: integer, format: int64 }
        deleted: { type: boolean }

    NicknameCheckResponse:
      type: object
      properties:
        nickname: { type: string }
        available: { type: boolean }

    LoginIdCheckResponse:
      type: object
      properties:
        loginId: { type: string }
        available: { type: boolean }

    UpdateMyLocationRequest:
      type: object
      required: [location]
      properties:
        location: { type: string }

    UpdateMyLocationResponse:
      type: object
      properties:
        location: { type: string }

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
